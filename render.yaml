# Blueprint: push to the linked GitHub branch (e.g. syndiode) → Render auto-deploys (autoDeployTrigger: commit).
# Agent-facing links must use the public edge URL (syndiode.com/nomad), not an unrouted Render hostname.
services:
  - type: web
    name: nomad-api
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python nomad_api.py
    healthCheckPath: /health
    autoDeployTrigger: commit
    domains:
      # Optional direct Render custom host; public AgentCard/swarm URLs use NOMAD_PUBLIC_API_URL below.
      - onrender.syndiode.com
    envVars:
      - key: NOMAD_API_HOST
        value: 0.0.0.0
      - key: NOMAD_PUBLIC_API_URL
        value: https://syndiode.com/nomad
      - key: NOMAD_COLLABORATION_HOME_URL
        value: https://syndiode.com/nomad
      - key: NOMAD_RENDER_DOMAIN
        value: onrender.syndiode.com
      - key: NOMAD_AGENT_NAME
        value: LoopHelper
      - key: NOMAD_OUTBOUND_AGENT_COLLABORATION_ENABLED
        value: "true"
      - key: NOMAD_ACCEPT_AGENT_HELP
        value: "true"
      - key: NOMAD_LEARN_FROM_AGENT_REPLIES
        value: "true"
      - key: NOMAD_OPERATOR_GRANT
        value: bounded_machine_agent_swarm
      - key: NOMAD_OPERATOR_GRANT_ACTIONS
        value: development,self_development,self_improvement,productization,lead_discovery,lead_conversion,mutual_aid,machine_outreach,agent_endpoint_contact,service_work,code_review_diff_share,autonomous_continuation
      - key: NOMAD_AUTOPILOT_DAILY_LEAD_TARGET
        value: "12"
      - key: NOMAD_REQUIRE_SERVICE_PAYMENT
        value: "true"
      - key: NOMAD_AUTOPILOT_A2A_SEND
        value: "false"
      - key: NOMAD_AUTOPILOT_SEND_OUTREACH
        value: "false"
